name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/backend-deploy.yml"

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug repository files
        run: |
          echo "Current directory:"
          pwd

          echo "Repository files:"
          ls -la

          echo "Checking server folder:"
          ls -la server

          echo "Checking backend package.json:"
          ls -la server/package.json

      - name: Configure SSH key on GitHub runner
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H ${{ secrets.FRONTEND_HOST }} >> ~/.ssh/known_hosts

      - name: Upload backend files to frontend jump host
        run: |
          echo "Checking backend files before upload:"
          ls -la server
          ls -la server/package.json

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.FRONTEND_USER }}@${{ secrets.FRONTEND_HOST }} \
            "rm -rf /tmp/backend-upload && mkdir -p /tmp/backend-upload"

          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -r ./server/. \
            ${{ secrets.FRONTEND_USER }}@${{ secrets.FRONTEND_HOST }}:/tmp/backend-upload/

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.FRONTEND_USER }}@${{ secrets.FRONTEND_HOST }} \
            "echo 'Files on frontend jump host:' && ls -la /tmp/backend-upload && ls -la /tmp/backend-upload/package.json"

      - name: Copy backend files from jump host to private backend EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.FRONTEND_USER }}@${{ secrets.FRONTEND_HOST }} << 'EOF'
          set -e

          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.SSH_PRIVATE_KEY }}' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "Files on frontend before copying to backend:"
          ls -la /tmp/backend-upload
          ls -la /tmp/backend-upload/package.json

          ssh-keyscan -H ${{ secrets.BACKEND_PRIVATE_HOST }} >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.BACKEND_USER }}@${{ secrets.BACKEND_PRIVATE_HOST }} \
            "rm -rf /tmp/backend-upload && mkdir -p /tmp/backend-upload"

          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -r /tmp/backend-upload/. \
            ${{ secrets.BACKEND_USER }}@${{ secrets.BACKEND_PRIVATE_HOST }}:/tmp/backend-upload/

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.BACKEND_USER }}@${{ secrets.BACKEND_PRIVATE_HOST }} \
            "echo 'Files on backend after copy:' && ls -la /tmp/backend-upload && ls -la /tmp/backend-upload/package.json"
          EOF

      - name: Deploy backend on private EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.FRONTEND_USER }}@${{ secrets.FRONTEND_HOST }} << 'EOF'
          set -e

          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.SSH_PRIVATE_KEY }}' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.BACKEND_USER }}@${{ secrets.BACKEND_PRIVATE_HOST }} << 'BACKEND'
          set -e

          echo "Deploying backend on private EC2..."

          echo "Checking uploaded backend files:"
          ls -la /tmp/backend-upload
          ls -la /tmp/backend-upload/package.json

          sudo mkdir -p /var/www/backend

          if ! command -v rsync >/dev/null 2>&1; then
            sudo dnf install -y rsync || sudo yum install -y rsync
          fi

          sudo rsync -av --delete /tmp/backend-upload/ /var/www/backend/
          sudo chown -R ec2-user:ec2-user /var/www/backend

          if [ -f /home/ec2-user/.env ]; then
            cp /home/ec2-user/.env /var/www/backend/.env
          else
            echo "ERROR: /home/ec2-user/.env not found"
            echo "Create it on backend EC2 using: nano /home/ec2-user/.env"
            exit 1
          fi

          cd /var/www/backend

          echo "Checking deployment folder:"
          ls -la
          ls -la package.json

          npm install --omit=dev

          pm2 restart backend || pm2 start npm --name backend -- start

          pm2 save

          echo "Testing backend health locally:"
          curl -f http://localhost:5000/api/health
          BACKEND
          EOF

      - name: Validate backend through frontend reverse proxy
        run: |
          curl -f ${{ secrets.DOMAIN_URL }}/api/health