name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/backend-deploy.yml"

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key on GitHub runner
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H ${{ secrets.FRONTEND_HOST }} >> ~/.ssh/known_hosts

      - name: Upload backend files to frontend jump host
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.FRONTEND_USER }}@${{ secrets.FRONTEND_HOST }} \
            "rm -rf /tmp/backend-upload && mkdir -p /tmp/backend-upload"

          scp -i ~/.ssh/deploy_key -r server/* \
            ${{ secrets.FRONTEND_USER }}@${{ secrets.FRONTEND_HOST }}:/tmp/backend-upload/

      - name: Copy backend files from jump host to private backend EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.FRONTEND_USER }}@${{ secrets.FRONTEND_HOST }} << EOF
            set -e

            mkdir -p ~/.ssh

            printf '%s\n' '${{ secrets.SSH_PRIVATE_KEY }}' > ~/.ssh/deploy_key

            chmod 600 ~/.ssh/deploy_key

            ssh-keyscan -H ${{ secrets.BACKEND_PRIVATE_HOST }} >> ~/.ssh/known_hosts

            ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.BACKEND_USER }}@${{ secrets.BACKEND_PRIVATE_HOST }} \
              "rm -rf /tmp/backend-upload && mkdir -p /tmp/backend-upload"

            scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -r /tmp/backend-upload/* \
              ${{ secrets.BACKEND_USER }}@${{ secrets.BACKEND_PRIVATE_HOST }}:/tmp/backend-upload/
          EOF

      - name: Deploy backend on private EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.FRONTEND_USER }}@${{ secrets.FRONTEND_HOST }} << EOF
            set -e

            ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.BACKEND_USER }}@${{ secrets.BACKEND_PRIVATE_HOST }} << BACKEND
              set -e

              sudo mkdir -p /var/www/backend

              if ! command -v rsync >/dev/null 2>&1; then
                sudo dnf install -y rsync || sudo yum install -y rsync
              fi

              sudo rsync -av --delete /tmp/backend-upload/ /var/www/backend/
              sudo chown -R ec2-user:ec2-user /var/www/backend

              if [ -f /home/ec2-user/env ]; then
                cp /home/ec2-user/env /var/www/backend/.env
              else
                echo "ERROR: /home/ec2-user/backend.env not found"
                exit 1
              fi

              cd /var/www/backend

              npm install --omit=dev

              pm2 restart backend || pm2 start npm --name backend -- start

              pm2 save

              curl -f http://localhost:5000/api/health
          BACKEND
          EOF

      - name: Validate backend through frontend reverse proxy
        run: |
          curl -f ${{ secrets.DOMAIN_URL }}/api/health
