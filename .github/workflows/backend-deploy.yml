name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/backend-deploy.yml"

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug repository files
        run: |
          echo "Current directory:"
          pwd

          echo "Checking server folder:"
          ls -la server

          echo "Checking backend package.json:"
          ls -la server/package.json

      - name: Configure SSH key on GitHub runner
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H ${{ secrets.FRONTEND_HOST }} >> ~/.ssh/known_hosts

      - name: Create backend package archive
        run: |
          tar -czf backend.tar.gz -C server .
          ls -lh backend.tar.gz

      - name: Upload backend archive to frontend jump host
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.FRONTEND_USER }}@${{ secrets.FRONTEND_HOST }} \
            "rm -rf /tmp/backend-upload && mkdir -p /tmp/backend-upload"

          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            backend.tar.gz \
            ${{ secrets.FRONTEND_USER }}@${{ secrets.FRONTEND_HOST }}:/tmp/backend-upload/backend.tar.gz

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.FRONTEND_USER }}@${{ secrets.FRONTEND_HOST }} \
            "echo 'Files on frontend jump host:' && ls -lh /tmp/backend-upload"

      - name: Copy archive and deploy backend on private EC2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.FRONTEND_USER }}@${{ secrets.FRONTEND_HOST }} << 'EOF'
          set -e

          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.SSH_PRIVATE_KEY }}' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "1. Checking archive on frontend jump host:"
          ls -lh /tmp/backend-upload/backend.tar.gz

          ssh-keyscan -H ${{ secrets.BACKEND_PRIVATE_HOST }} >> ~/.ssh/known_hosts

          echo "2. Preparing backend upload folder on private EC2:"
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.BACKEND_USER }}@${{ secrets.BACKEND_PRIVATE_HOST }} \
            "rm -rf /tmp/backend-upload && mkdir -p /tmp/backend-upload"

          echo "3. Copying archive to private backend EC2:"
          cat /tmp/backend-upload/backend.tar.gz | ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.BACKEND_USER }}@${{ secrets.BACKEND_PRIVATE_HOST }} \
            "cat > /tmp/backend-upload/backend.tar.gz"

          echo "4. Confirming archive exists on private backend EC2:"
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.BACKEND_USER }}@${{ secrets.BACKEND_PRIVATE_HOST }} \
            "ls -lh /tmp/backend-upload/backend.tar.gz"

          echo "5. Deploying backend:"
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.BACKEND_USER }}@${{ secrets.BACKEND_PRIVATE_HOST }} << 'BACKEND'
          set -e

          echo "Checking backend archive:"
          ls -lh /tmp/backend-upload/backend.tar.gz

          sudo rm -rf /var/www/backend
          sudo mkdir -p /var/www/backend
          sudo chown -R ec2-user:ec2-user /var/www/backend

          tar -xzf /tmp/backend-upload/backend.tar.gz -C /var/www/backend

          cd /var/www/backend

          echo "Checking extracted backend files:"
          ls -la
          ls -la package.json

          if [ -f /home/ec2-user/.env ]; then
            cp /home/ec2-user/.env /var/www/backend/.env
          else
            echo "ERROR: /home/ec2-user/.env not found"
            echo "Create it on backend EC2 using: nano /home/ec2-user/.env"
            exit 1
          fi

          npm install --omit=dev

          pm2 restart backend || pm2 start npm --name backend -- start

          pm2 save

          echo "Testing backend health locally:"
          curl -f http://localhost:5000/api/health
          BACKEND
          EOF

      - name: Validate backend through frontend reverse proxy
        run: |
          curl -f ${{ secrets.DOMAIN_URL }}/api/health
